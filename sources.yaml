# Job postings whose title/tags match these get pulled out of the Jobs
# section into a dedicated "Internships & Co-ops" section shown above it.
internship_keywords:
  - intern
  - internship
  - co-op
  - coop
  - student trainee
  - working student
  - summer analyst
  - graduate program

# Newsletter topic categories for jobs. Order matters: the first category
# whose keywords match a posting's title/tags wins; unmatched jobs land in
# "Other". Edit freely - names and emoji appear as-is in the newsletter.
categories:
  "🤖 AI & Machine Learning": [ai, artificial intelligence, machine learning, llm, deep learning]
  "🔐 Cybersecurity": [cybersecurity, cyber security, security]
  "📊 Data & Analytics": [data analyst, data science, data engineer, analytics, business intelligence, sql]
  "💰 Accounting & Finance": [accountant, accounting, audit, auditor, tax, finance, financial, banking]
  "💼 Business & Consulting": [business analyst, consultant, consulting, business, operations]
  "💻 Software & IT": [developer, software, programmer, information technology, information systems, it, web, cloud, devops, engineer]

# Same idea for the Hackathons section. Matched against title + tags -
# Devpost theme tags (Machine Learning/AI, Beginner Friendly, ...) and the
# MLH In-Person/Digital tag do most of the work. First match wins, so
# In-Person is listed first: a travel-able event matters more to members
# than its theme.
hackathon_categories:
  "🏟 In-Person": [in-person]
  "🌱 Beginner Friendly": [beginner friendly, beginner, first-timers, students]
  "🤖 AI & Machine Learning": [ai, artificial intelligence, machine learning, machine learning/ai, llm, voice skills]
  "⛓️ Blockchain & Fintech": [blockchain, web3, crypto, fintech]
  "🎮 Games & AR/VR": [ar/vr, game, gaming, metaverse]
  "🌍 Social Good & Education": [social good, education, sustainability, health, accessibility]

# Locations for hackathon sources (YAML anchor: defined once with &name,
# reused below with *name). In-person hackathons only within reach of
# Morgantown - Washington DC, West Virginia, Ohio, Pittsburgh - while
# online/virtual events always pass. The dc/d.c/district-of-columbia variants
# cover how different sites write the capital (deliberately NOT bare
# "washington", which would wrongly match Washington state).
# Ohio city names included because some sources (confs.tech) give only a
# city with no state.
hackathon_locations: &hackathon_locations
  [online, virtual, digital, remote,
   west virginia, wv, morgantown,
   ohio, columbus, cleveland, cincinnati, dayton, akron,
   pittsburgh,
   dc, d.c, district of columbia, washington dc]

sources:
  # ---- Greenhouse boards (company career sites backed by Greenhouse) ------
  # Find the token: company careers page URL like boards.greenhouse.io/<token>,
  # or view-source and search for "greenhouse".
  - name: Stripe
    type: greenhouse
    opportunity_type: job
    org: Stripe
    options:
      board_token: stripe

  - name: Datadog
    type: greenhouse
    opportunity_type: job
    org: Datadog
    options:
      board_token: datadog

  - name: Anthropic
    type: greenhouse
    opportunity_type: job
    org: Anthropic
    options:
      board_token: anthropic

  - name: Scale AI
    type: greenhouse
    opportunity_type: job
    org: Scale AI
    options:
      board_token: scaleai

  - name: Databricks
    type: greenhouse
    opportunity_type: job
    org: Databricks
    options:
      board_token: databricks

  - name: xAI
    type: greenhouse
    opportunity_type: job
    org: xAI
    options:
      board_token: xai

  # ---- Lever boards --------------------------------------------------------
  # Slug is the path at jobs.lever.co/<company>.
  - name: Palantir
    type: lever
    opportunity_type: job
    org: Palantir
    options:
      company: palantir

  - name: Mistral AI
    type: lever
    opportunity_type: job
    org: Mistral AI
    options:
      company: mistral

  # ---- Ashby boards (public JSON, works via the generic json_api adapter) ---
  - name: OpenAI
    type: json_api
    opportunity_type: job
    org: OpenAI
    url: https://api.ashbyhq.com/posting-api/job-board/openai
    options:
      items_path: jobs
      fields:
        title: title
        location: location
        url: jobUrl
        posted_date: publishedAt

  - name: Cohere
    type: json_api
    opportunity_type: job
    org: Cohere
    url: https://api.ashbyhq.com/posting-api/job-board/cohere
    options:
      items_path: jobs
      fields:
        title: title
        location: location
        url: jobUrl
        posted_date: publishedAt

  # ---- Workday sites ---------------------------------------------------------
  # WVU Medicine is one of WV's largest employers; searchText keeps the result
  # set small (their full board is thousands of clinical roles).
  - name: WVU Medicine (analyst)
    type: workday
    opportunity_type: job
    org: WVU Medicine
    options:
      host: wvumedicine.wd1.myworkdayjobs.com
      tenant: wvumedicine
      site: WVUH
      search_text: analyst

  - name: WVU Medicine (intern)
    type: workday
    opportunity_type: job
    org: WVU Medicine
    options:
      host: wvumedicine.wd1.myworkdayjobs.com
      tenant: wvumedicine
      site: WVUH
      search_text: intern

  # ---- Aggregators / feeds -------------------------------------------------
  - name: RemoteOK
    type: json_api
    opportunity_type: job
    url: https://remoteok.com/api
    # mostly remote, but they also list some location-bound foreign jobs -
    # keep only genuinely remote/US-reachable ones
    include_locations: [remote, worldwide, anywhere, united states, usa, north america, americas]
    options:
      items_path: ""            # payload itself is the list (first item is metadata, auto-skipped)
      fields:
        title: position
        org: company
        location: location
        url: url
        description: description
        posted_date: date
        # RemoteOK auto-stuffs tags like "analyst"/"exec" onto every posting,
        # which breaks keyword filtering - so we deliberately don't map them

  - name: WeWorkRemotely
    type: rss
    opportunity_type: job
    url: https://weworkremotely.com/remote-jobs.rss   # all-jobs feed; global filters narrow it down
    # feed's region field says who can apply - drop "Europe Only" etc.
    include_locations: [anywhere, usa, united states, us only, north america, americas, worldwide, remote]

  # ---- Adzuna API (free key from https://developer.adzuna.com) -------------
  # Needs ADZUNA_APP_ID + ADZUNA_APP_KEY env vars; skipped with a warning otherwise.
  # Best coverage of WV-local jobs. WVU (Taleo) and the WV state jobs portal
  # (NEOGOV) render listings with JavaScript, so aggregator APIs like this are
  # the reliable way to see local postings.
  - name: Adzuna WV analysts
    type: adzuna
    opportunity_type: job
    options:
      country: us
      what: analyst
      where: West Virginia
      max_days_old: 30

  # Companies with no public job feed (KPMG, Deloitte, EY, CGI use
  # Avature/SuccessFactors/custom portals; Microsoft's careers API has a broken
  # TLS cert) are covered via Adzuna company searches. The global location
  # filter then keeps only WV + remote postings.
  - name: Adzuna KPMG
    type: adzuna
    opportunity_type: job
    options: {country: us, company: KPMG, what: analyst, max_days_old: 30}

  - name: Adzuna Deloitte
    type: adzuna
    opportunity_type: job
    options: {country: us, company: Deloitte, what: analyst, max_days_old: 30}

  - name: Adzuna EY
    type: adzuna
    opportunity_type: job
    options: {country: us, company: EY, what: analyst, max_days_old: 30}

  # Adzuna's company filter needs their canonical name; plain "CGI" returns 400
  - name: Adzuna CGI
    type: adzuna
    opportunity_type: job
    options: {country: us, company: CGI Technologies and Solutions, what: analyst, max_days_old: 30}

  - name: Adzuna Microsoft
    type: adzuna
    opportunity_type: job
    options: {country: us, company: Microsoft, what: analyst, max_days_old: 30}

  # WVU itself runs on Taleo (JS-rendered, unscrapeable). Adzuna's company
  # filter 400s on every "West Virginia University*" variant (their API bug,
  # verified 2026-07-07), so WVU postings arrive via the WV-wide searches below.
  - name: Adzuna WVU
    type: adzuna
    enabled: false
    opportunity_type: job
    options: {country: us, company: West Virginia University, where: West Virginia, max_days_old: 30}

  - name: Adzuna WV interns
    type: adzuna
    opportunity_type: job
    options: {country: us, what: intern, where: West Virginia, max_days_old: 30}

  - name: Adzuna WV accounting
    type: adzuna
    opportunity_type: job
    options: {country: us, what: accounting, where: West Virginia, max_days_old: 30}

  - name: Adzuna WV tech
    type: adzuna
    opportunity_type: job
    options: {country: us, what: software, where: West Virginia, max_days_old: 30}

  - name: Adzuna WV cybersecurity
    type: adzuna
    opportunity_type: job
    options: {country: us, what: cybersecurity, where: West Virginia, max_days_old: 30}

  # Career-fair firms without public feeds (Forvis Mazars' Greenhouse board is
  # Europe-only; A&M/CohnReznick/United Bank portals are JS or bot-blocked).
  # FBI CJIS posts on fbijobs.gov (login-only SuccessFactors) - check manually.
  - name: Adzuna Forvis Mazars
    type: adzuna
    opportunity_type: job
    options: {country: us, company: Forvis, max_days_old: 30}   # "Forvis Mazars" 400s; "Forvis" works

  # Alvarez & Marsal: no company-name variant is queryable in Adzuna and their
  # own careers site bot-blocks - postings only reachable manually.
  - name: Adzuna Alvarez & Marsal
    type: adzuna
    enabled: false
    opportunity_type: job
    options: {country: us, company: Alvarez & Marsal, max_days_old: 30}

  - name: Adzuna CohnReznick
    type: adzuna
    opportunity_type: job
    options: {country: us, company: CohnReznick, max_days_old: 30}

  - name: Adzuna United Bank
    type: adzuna
    opportunity_type: job
    options: {country: us, company: United Bank, where: West Virginia, max_days_old: 30}

  # Not automatable (verified 2026-07-07): Bravo Consulting embeds an Angular
  # AgileATS widget, Trilogy Innovations hires via careers@ email, NextGen
  # Federal lists no machine-readable postings. Check those manually.

  # Agile5 Technologies (Fairmont WV, DevSecOps/cyber - STEM fair employer).
  # Their ADP WorkforceNow API responds but had 0 postings on 2026-07-08, so
  # field mappings are unverified - enable and check when they post jobs.
  - name: Agile5 Technologies
    type: json_api
    enabled: false
    opportunity_type: job
    org: Agile5 Technologies
    url: https://workforcenow.adp.com/mascsr/default/careercenter/public/events/staffing/v1/job-requisitions?cid=18bcd225-9065-4e78-8585-763a250b6ab5&ccId=19000101_000001&lang=en_US
    options:
      items_path: jobRequisitions
      fields:
        title: requisitionTitle
        posted_date: postDate

  # ---- USAJOBS API (free key from https://developer.usajobs.gov) ------------
  # Federal jobs are a major WV employer (FBI CJIS Clarksburg, NIOSH Morgantown).
  # Needs USAJOBS_API_KEY + USAJOBS_EMAIL env vars; skipped with a warning otherwise.
  - name: USAJobs WV
    type: usajobs
    opportunity_type: job
    options:
      keyword: analyst
      location_name: West Virginia

  # ---- Official company career pages (plain HTML) ---------------------------
  # Template — fill in the real URL + CSS selectors for each company you want.
  # Only works for server-rendered pages; if jobs load via JavaScript, look for
  # the underlying Greenhouse/Lever/Workday API instead.
  - name: Example Company Careers
    type: html
    enabled: false
    opportunity_type: job
    org: Example Company
    url: https://example.com/careers
    options:
      selectors:
        item: ".job-listing"
        title: ".job-title"
        link: "a"
        location: ".job-location"
        date: ".job-date"

  # ---- Phase 2: hackathons & conferences ------------------------------------
  # Same pipeline, different opportunity_type. NOTE: global keyword/location
  # filters only apply to jobs - event sources rely on their own lists here.

  # Only open/upcoming hackathons are fetched; posted_date = submission
  # deadline, and the newsletter drops events whose date has passed.
  # exclude_keywords drops online hackathons restricted to other regions.
  - name: Devpost
    type: devpost
    opportunity_type: hackathon
    include_locations: *hackathon_locations
    exclude_keywords: [india, africa, europe, apac, mena]

  # Bump the season in the URL each summer (2027 = fall 2026 - spring 2027).
  - name: MLH
    type: mlh
    opportunity_type: hackathon
    url: https://mlh.io/seasons/2027/events
    include_locations: *hackathon_locations

  # WVU's own events calendar (Localist). The 138+ events per quarter include
  # everything from concerts to payment-plan reminders, so the per-source
  # keywords keep only tech/career/business events.
  - name: WVU Events
    type: json_api
    opportunity_type: conference
    org: WVU
    url: https://wvu.enterprise.localist.com/api/2/events?days=90&pp=100
    options:
      items_path: events
      fields:
        title: event.title
        url: event.localist_url
        location: event.location_name
        posted_date: event.first_date
        description: event.description_text
      flags:
        Free: event.free        # Localist marks free events; shows as a tag
    # "data" alone matched biology seminars ("...Transcriptomic Data") - use
    # the specific phrases instead
    include_keywords: &campus_event_keywords
                      [tech, technology, data science, data analytics, big data,
                       analytics, coding, programming,
                       hackathon, cyber, cybersecurity, computer, computing,
                       information systems, career fair, networking, ai,
                       artificial intelligence, entrepreneurship, innovation,
                       business, consulting]

  # Pitt's calendar (also Localist) - Pittsburgh is in members' travel range.
  - name: Pitt Events
    type: json_api
    opportunity_type: conference
    org: University of Pittsburgh
    url: https://calendar.pitt.edu/api/2/events?days=90&pp=100
    options:
      items_path: events
      fields:
        title: event.title
        url: event.localist_url
        location: event.location_name
        posted_date: event.first_date
        description: event.description_text
      flags:
        Free: event.free
    include_keywords: *campus_event_keywords

  # Community-maintained tech conference list (JSON files on GitHub).
  # Reads data/security/devops/general topics for this year + next.
  # IN-PERSON REGIONAL ONLY - deliberately no online/virtual keywords:
  # confs.tech's online listings are mostly paid, foreign-run conference
  # brands (German webinar series etc.) and it has no price data to filter
  # on. Free online events come from the campus calendars instead.
  - name: Confs.tech
    type: confstech
    opportunity_type: conference
    include_locations: [west virginia, wv, morgantown,
                        ohio, columbus, cleveland, cincinnati, dayton, akron,
                        pittsburgh,
                        dc, d.c, district of columbia, washington dc]

# Newsletter content that isn't scraped: a per-issue welcome blurb, upcoming
# MISA meetings/events, and social/contact links for the footer. Edit these
# by hand each week - `events` entries with a `date` in the past are dropped
# automatically, so stale meetings don't need manual cleanup.
newsletter:
  # Where the teaser's "See all N" links point - the "_full" archive pages
  # get published to docs/ and served by GitHub Pages (Settings -> Pages ->
  # Deploy from branch -> main -> /docs, one-time setup). Leave blank to fall
  # back to a relative filename (only works if both files travel together).
  archive_base_url: https://kornelkaaaa.github.io/scrape_job_postings_misa
  intro: >
    Welcome back, Mountaineers! Here's what's new this week - internships,
    hackathons, and MISA happenings all in one place.
  social:
    instagram: https://instagram.com/wvumisa
    linkedin: https://linkedin.com/company/wvu-misa
    email: misa@mail.wvu.edu
  events:
    # Example entries - replace with real MISA meetings/events.
    - title: MISA General Meeting
      date: 2026-07-15
      time: "6:00 PM"
      location: John Chambers College of Business and Economics, Room 150
      url: https://misa.wvu.edu
      description: Weekly meeting - guest speaker from a local tech employer.
    - title: Fall Career Fair Prep Workshop
      date: 2026-08-28
      time: "5:30 PM"
      location: Chambers Building, Room B120
      description: Resume review and mock interviews ahead of the September career fairs.
