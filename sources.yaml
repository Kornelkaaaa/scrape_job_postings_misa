# MISA opportunity pipeline — source configuration.
#
# Adding a source = adding an entry here; no code changes needed.
# Types: greenhouse | lever | rss | json_api | html | adzuna
# Set enabled: false to skip a source (e.g. if it starts blocking us).

settings:
  db_path: data/opportunities.db
  output_dir: output
  delay_seconds: 2.0
  # user_agent: override if you want a custom one

# Global relevance filter for MISA members (junior/intern BA, consulting, AI).
# Keywords matched (whole-word, case-insensitive) against title + tags.
# Locations matched against the location field; items with NO location info
# pass through. A source can override any list; include_locations: ["*"]
# opts a source out of location filtering (for remote-only boards).
filters:
  # WV students: keep West Virginia jobs + anything explicitly remote
  include_locations:
    - west virginia
    - wv
    - morgantown
    - charleston
    - huntington
    - clarksburg
    - fairmont
    - wheeling
    - parkersburg
    - martinsburg
    - beckley
    - remote
  include_keywords:
    - intern
    - internship
    - junior
    - graduate
    - entry level
    - entry-level
    - working student
    - student
    - trainee
    - business analyst
    - data analyst
    - analyst
    - consultant
    - consulting
    - accountant
    - accounting
    - audit
    - auditor
    - tax
    - developer
    - software
    - cybersecurity
    - cyber security
    - information technology
    - information systems
    - data science
    - ai
    - artificial intelligence
    - machine learning
  exclude_keywords:
    - senior
    - sr               # catches "Sr.", "Sr", "SR" as whole words
    - staff
    - principal
    - director
    - lead
    - manager
    - supervisor
    - architect
    - chief
    - head of
    - vp
    - svp
    - vice president
    - executive officer
    - meeting          # recruiting events mislabeled as jobs
    - info session

